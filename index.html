<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryVerse</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

/* header */

header{
text-align:center;
padding:20px;
background:#222;
color:white;
}

.search-box{
width:90%;
max-width:400px;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

/* story section */

.section{
padding:20px;
}

.story-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
}

.story-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
padding-bottom:10px;
}

.story-card img{
width:fit-content;
height:220px;
object-fit:cover;
}

.story-card h3{
margin:10px 0 5px;
text-align:center;
margin-bottom:10px;
}

.story-card a{
text-decoration:none;
font-size:20px;
color:#0077cc;
}

.story-card p{
font-size:14px;
padding:0 10px;
}

/* bottom navigation */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#222;
display:flex;
justify-content:center;
gap:40px;
padding:15px;
}

.bottom-nav a{
color:white;
text-decoration:none;
font-size:14px;
}

.bottom-nav a:hover{
color:#00ccff;
}

footer{
text-align: center;
margin-top: 20px;
}

</style>
</head>

<body>

<header>
<h1>StoryVerse</h1>
<input class="search-box" type="text" placeholder="Search stories...">
</header>

<section class="section">
<h2>Trending</h2>
<div class="story-grid">

<!-- YOUR STORY -->

<div class="story-card">
<a href="the-lost-kingdom.html">
<img src="the-lost-kingdom.jpg">

<h3>The Lost Kingdom</h3>

<p>
A young warrior discovers a mysterious map leading to a forgotten kingdom
and begins a dangerous adventure to restore it.
</p>
</a>
</div>
</div>
</section>

<nav class="bottom-nav">
<a href="#">Trending</a>
<a href="#">Library</a>
<a href="#">History</a>
<a href="#">Updates</a>
<a href="#">more</a>
</nav>

<footer>
<p>© 2026 StoryVerse</p>
</footer>


</body>
</html>
