<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryVerse</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
  padding-bottom:80px; /* space for bottom nav */
}

/* header */
header{
  text-align:center;
  padding:20px;
  background:#222;
  color:white;
}

/* search bar in header */
.search-box{
  width:90%;
  max-width:400px;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* story section */
.section{
  padding:20px;
}

.story-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
}

.story-card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
  padding-bottom:10px;
}

.story-card img{
  width:fit-content;
  height:220px;
  object-fit:cover;
}

.story-card h3{
  margin:10px 0 5px;
}

.story-card a{
  text-decoration:none;
  font-size:20px;
  color:#0077cc;
}

.story-card p{
  font-size:14px;
  padding:0 10px;
}

/* bottom navigation */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#222;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  padding:11px 5px;
  z-index:1000;
}

.bottom-nav a{
  text-align:center;
  color:white;
  font-size:12px;
  text-decoration:none;
  white-space:nowrap;
  padding:5px 10px;
  border-radius:8px;
  transition: all 0.2s ease-in-out; /* smooth hover */
}

/* Hover effect for all links */
.bottom-nav a:hover{
  background:#444;     
  color:#00ccff;       
  transform: scale(1.05); 
}

/* Active link effect for non-trending links */
.bottom-nav a.active:not(.trending){
  background:#333;     
  color:#00ccff;       
  font-weight:bold;
  box-shadow: 0 0 5px #00ccff; 
}

footer{
  text-align:center;
  margin-top:20px;
}

/* mobile adjustments */
@media (max-width: 480px){
  .bottom-nav{
    padding:8px;
    gap:10px;
  }
  .bottom-nav a{
    font-size:12px;
    padding:5px;
  }
  .search-box{
    max-width:90%;
    font-size:14px;
  }
}
</style>
</head>

<body>

<header>
  <h1>StoryVerse</h1>
  <input class="search-box" type="text" placeholder="Search stories...">
</header>

<section class="section">
<h2>Trending</h2>
<div class="story-grid">

<div class="story-card">
  <a href="the-lost-kingdom.html">
    <img src="the-lost-kingdom.jpg" alt="The Lost Kingdom">
    <h3>The Lost Kingdom</h3>
    <p>A young warrior discovers a mysterious map leading to a forgotten kingdom and begins a dangerous adventure to restore it.</p>
  </a>
</div>

</div>
</section>

<!-- bottom navigation -->
<nav class="bottom-nav">
  <a href="#" class="trending active">🔥<br>Trending</a>
  <a href="library.html">📚<br>Library</a>
  <a href="updates.html">🔔<br>Updates</a>
  <a href="history.html">🕒<br>History</a>
  <a href="more.html">⚙<br>More</a>
</nav>

<footer>
<p>© 2026 StoryVerse</p>
</footer>

<script>
// Automatically add 'active' class based on current page
const navLinks = document.querySelectorAll('.bottom-nav a');
const currentPage = window.location.pathname.split('/').pop(); // get current file name

navLinks.forEach(link => {
  const linkPage = link.getAttribute('href');
  if(linkPage === currentPage){
    link.classList.add('active');
  }
});
</script>

</body>
</html>
